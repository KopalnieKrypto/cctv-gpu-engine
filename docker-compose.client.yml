# client-agent: Flask UI + ffmpeg RTSP recorder + R2 uploader (issue #16).
#
# Run on the customer's premises (CPU-only host, no GPU required):
#   docker compose -f docker-compose.client.yml up -d
#
# The agent reads R2 credentials from .env.client (copy .env.client.example).
# The Flask UI is exposed on host port 8080 once #7 lands; today the
# container runs a placeholder that blocks on SIGTERM.
services:
  client-agent:
    image: ghcr.io/kopalniekrypto/cctv-gpu-engine/client-agent:latest
    build:
      context: .
      dockerfile: client-agent/Dockerfile
    container_name: cctv-client-agent
    restart: unless-stopped
    env_file:
      - .env.client
    ports:
      - "8080:8080"
    volumes:
      # Workdir for ffmpeg-recorded chunks before they're uploaded to R2.
      # Bind to a named volume so `docker compose down` survives in-flight
      # recordings between restarts.
      - cctv-client-workdir:/tmp/cctv-recordings

volumes:
  cctv-client-workdir:
