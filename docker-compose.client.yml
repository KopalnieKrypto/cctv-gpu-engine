# client-agent: Flask UI + R2 uploader (issue #7), RTSP recorder follows in #8.
#
# Run on the customer's premises (CPU-only host, no GPU required):
#   docker compose -f docker-compose.client.yml up -d
#
# The agent reads R2 credentials from .env.client (copy .env.client.example).
# The Flask UI listens on host port 8080: MP4 upload form, job list with
# status badges (auto-refresh 10s), and report viewer.
services:
  client-agent:
    image: ghcr.io/kopalniekrypto/cctv-gpu-engine/client-agent:latest
    build:
      context: .
      dockerfile: client-agent/Dockerfile
    container_name: cctv-client-agent
    restart: unless-stopped
    env_file:
      - .env.client
    # ONVIF WS-Discovery (issue #21) uses UDP multicast 239.255.255.250:3702.
    # Docker's default ``bridge`` network does NOT forward multicast, so
    # ``GET /cameras/discover`` will return zero cameras even with cameras
    # on the host LAN. To enable discovery, switch to host networking by
    # uncommenting ``network_mode: host`` below AND removing the ``ports:``
    # mapping (host networking exposes :8080 directly). Caveats:
    #   - host networking is Linux-only (Docker Desktop on macOS/Windows
    #     ignores it); on those platforms run the standalone appliance
    #     entrypoint instead (Phase 3, follow-up issue).
    #   - the container shares the host's network namespace — port 8080
    #     must be free on the host.
    # network_mode: host
    ports:
      - "8080:8080"
    volumes:
      # Workdir for ffmpeg-recorded chunks before they're uploaded to R2.
      # Bind to a named volume so `docker compose down` survives in-flight
      # recordings between restarts.
      - cctv-client-workdir:/tmp/cctv-recordings

volumes:
  cctv-client-workdir:
