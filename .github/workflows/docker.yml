name: Build Docker images

on:
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - "gpu-service/**"
      - "client-agent/**"
  pull_request:
    branches: [main]
    paths:
      - "pipeline/**"
      - "gpu-service/**"
      - "client-agent/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  gpu-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f gpu-service/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::gpu-service/Dockerfile does not exist yet (deferred per CLAUDE.md TODO) — skipping build"
          fi

      - uses: docker/login-action@v3
        if: steps.check.outputs.exists == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        if: steps.check.outputs.exists == 'true'
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/gpu-service
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'true'
        with:
          context: .
          file: gpu-service/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Disable provenance + SBOM attestations: every main-branch push of
          # this image (the 15 GB gpu-service one) since 2026-06-10 #43 has
          # been failing the *push* step against GHCR with
          # `ERROR: failed to build: unknown blob`. The pattern matches a
          # known buildx + GHCR interaction where attestation manifests
          # reference blobs by digest that GHCR has not yet committed when
          # the attestation tries to land. Disabling provenance is the
          # documented fix in the docker/build-push-action issue tracker.
          # PR-event builds (push=false) were unaffected because they never
          # reached the push step.
          provenance: false
          sbom: false

  client-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f client-agent/Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::client-agent/Dockerfile does not exist yet (deferred per CLAUDE.md TODO) — skipping build"
          fi

      - uses: docker/login-action@v3
        if: steps.check.outputs.exists == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        if: steps.check.outputs.exists == 'true'
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/client-agent
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        if: steps.check.outputs.exists == 'true'
        with:
          context: .
          file: client-agent/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
