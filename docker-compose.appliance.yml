# Phase 4 platform mode for the client appliance (issue #30).
#
# Run on an operator's mini-PC where Docker is preferred over the bare-metal
# install path (`client-appliance/install.sh`). The container exposes the
# Flask UI on :8080 *and* boots a TaskPoller background thread that drives
# the platform's claim → trim → upload cycle.
#
# Required env (no defaults — empty falls back to legacy standalone flow):
#   PLATFORM_URL=https://platform.example
#   APPLIANCE_TOKEN=<bearer issued by platform admin UI>
#   R2_ENDPOINT / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_BUCKET
#
# Optional:
#   BUFFER_HOURS=1                   # rolling-buffer retention (8+ in prod)
#   RTSP_DEFAULT_USER / _PASS        # camera credentials fallback
#   RTSP_CAM_<sanitized_ip>_USER     # per-camera override
#
# Usage:
#   cp .env.appliance.example .env.appliance && $EDITOR .env.appliance
#   docker compose -f docker-compose.appliance.yml up -d
#
# Legacy Docker UI mode (`docker-compose.client.yml`) still exists and runs
# `client_agent.agent` for operators who haven't migrated to the platform.
# Issue #29 retires the legacy compose file after the Phase 4 demo.
services:
  client-appliance:
    image: ghcr.io/kopalniekrypto/cctv-gpu-engine/client-agent:latest
    build:
      context: .
      dockerfile: client-agent/Dockerfile
    container_name: cctv-client-appliance
    restart: unless-stopped
    # Override the legacy ENTRYPOINT (client_agent.agent → Flask-only) with
    # the appliance entrypoint that also runs the TaskPoller + platform
    # heartbeat.
    entrypoint: ["python", "-m", "client_agent.appliance", "--env-dir", "/etc/cctv-client"]
    env_file:
      - .env.appliance
    environment:
      # Surface the canonical names so `docker compose config` shows them
      # without env_file inspection; required at boot.
      PLATFORM_URL: "${PLATFORM_URL:?PLATFORM_URL must be set in .env.appliance}"
      APPLIANCE_TOKEN: "${APPLIANCE_TOKEN:?APPLIANCE_TOKEN must be set in .env.appliance}"
      # 1h dev/MVP default; production overrides to 8+ in .env.appliance.
      BUFFER_HOURS: "${BUFFER_HOURS:-1}"
      BUFFER_DIR: /var/lib/cctv/buffer
    ports:
      - "8080:8080"
    volumes:
      # The rolling buffer must survive container restarts — losing chunks
      # means every in-flight task fails with "buffer empty" until the
      # cameras refill the window.
      - cctv-appliance-buffer:/var/lib/cctv/buffer
      # Mount the etc-dir read-only so the unit's load_env_files / platform
      # token loaders see the same files the bare-metal systemd unit does.
      - ./client-appliance:/etc/cctv-client:ro
    healthcheck:
      # The Flask UI returns 200 on `/` once waitress is bound and the
      # initial platform session has completed. 30s start_period gives the
      # appliance time to register + push cameras + heartbeat once before
      # docker marks it unhealthy.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=2)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  cctv-appliance-buffer:
